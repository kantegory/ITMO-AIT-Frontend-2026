<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Яндекс Афиша - Вход</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="row container-fluid mx-0 px-0">

<header class="col-12 mx-0 px-0">
  <nav class="navbar bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="login.html">Яндекс Афиша</a>
    </div>
  </nav>
</header>

<main class="col-12 px-0">
  <div class="d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 56px);">
    <div class="card shadow-sm" style="width: 400px;">
      <div class="card-body p-4">
        <h4 class="text-center mb-4">Вход</h4>
        <form action="index.html">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <label>
              <input type="email" class="form-control" placeholder="name@example.com" required>
            </label>
          </div>
          <div class="mb-3">
            <label class="form-label">Пароль</label>
            <label>
              <input type="password" class="form-control" placeholder="********" required>
            </label>
          </div>
          <button type="submit" class="btn btn-primary w-100">Войти</button>
        </form>
        <p class="text-center mt-3 mb-0 small">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

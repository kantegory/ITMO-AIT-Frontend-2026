<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Hub - Вход</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="top-nav">
    <nav class="container navbar navbar-expand-lg py-3">
      <a class="navbar-brand brand" href="content.html">AI Model & Dataset Hub</a>
      <ul class="navbar-nav ms-auto flex-row gap-3">
        <li class="nav-item"><a class="nav-link" href="registration.html">Регистрация</a></li>
        <li class="nav-item"><a class="nav-link active" href="authorization.html">Вход</a></li>
        <li class="nav-item"><a class="nav-link" href="search.html">Поиск</a></li>
      </ul>
    </nav>
  </header>

  <main class="page-shell">
    <div class="container">
      <div class="row g-4 justify-content-center">
        <div class="col-lg-6">
          <div class="hub-card p-4 p-md-5 h-100">
            <h1 class="section-title mb-2">Вход</h1>
            <p class="muted mb-4">Будь частью сообщества AI Model & Dataset Hub</p>
            <form class="row g-3">
              <div class="col-12">
                <label for="email" class="form-label">Email или логин</label>
                <input id="email" type="text" class="form-control" placeholder="name@example.com">
              </div>
              <div class="col-12">
                <label for="password" class="form-label">Пароль</label>
                <input id="password" type="password" class="form-control" placeholder="Введите пароль">
              </div>
              <div class="col-12 d-flex justify-content-between align-items-center">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="remember">
                  <label class="form-check-label" for="remember">Запомнить меня</label>
                </div>
                <a href="#">Забыли пароль?</a>
              </div>
              <div class="col-12 d-grid">
                <button class="btn btn-primary">Войти</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Hub - Поиск</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="search-page">
  <header class="top-nav">
    <nav class="container navbar navbar-expand-lg py-3">
      <a class="navbar-brand brand" href="content.html">AI Model & Dataset Hub</a>
      <ul class="navbar-nav ms-auto flex-row gap-3">
        <li class="nav-item"><a class="nav-link active" href="search.html">Поиск</a></li>
        <li class="nav-item"><a class="nav-link" href="profile.html">Профиль</a></li>
        <li class="nav-item"><a class="nav-link" href="model.html">Модель</a></li>
      </ul>
    </nav>
  </header>

  <main class="page-shell">
    <div class="container">
      <div class="row g-4">
        <div class="col-lg-4 col-xl-3">
          <aside class="hub-card p-4 filter-panel">
            <h2 class="section-title">Фильтры</h2>
            <div class="mb-3">
              <label for="searchInput" class="form-label">Поиск</label>
              <input id="searchInput" type="text" class="form-control">
            </div>
            <div class="mb-3">
              <label for="task" class="form-label">Задача</label>
              <select id="task" class="form-select">
                <option>Любая</option>
                <option>NLP</option>
                <option>Computer Vision</option>
                <option>Time Series</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="size" class="form-label">Размер</label>
              <select id="size" class="form-select">
                <option>Любой</option>
                <option>До 1 GB</option>
                <option>1 - 16 GB</option>
                <option>16 - 64 GB</option>
                <option>64+ GB</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="framework" class="form-label">Фреймворк</label>
              <select id="framework" class="form-select">
                <option>Любой</option>
                <option>PyTorch</option>
                <option>TensorFlow</option>
              </select>
            </div>
            <button class="btn btn-primary w-100">Применить фильтры</button>
          </aside>
        </div>

        <div class="col-lg-8 col-xl-9">
          <div class="hub-card p-4 p-md-5">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
              <h1 class="section-title mb-0">Найден 1 результат</h1>
              <select class="form-select w-auto">
                <option>Популярные</option>
                <option>Новые</option>
              </select>
            </div>
            <div class="mb-4">
              <span class="chip">NLP</span>
              <span class="chip">PyTorch</span>
              <span class="chip">1 - 16 GB</span>
            </div>

            <article class="hub-card result-card p-4 mb-3">
              <div class="d-flex justify-content-between flex-wrap gap-2">
                <h3 class="h5 mb-1"><a href="details.html">ruGigaSuperMega-model</a></h3>
                <span class="status-badge status-public">Model</span>
              </div>
              <p class="muted mb-2">Первая Российская модель</p>
              <div class="mb-2">
                <span class="chip">NLP</span>
                <span class="chip">PyTorch</span>
              </div>
              <div class="muted">
                <small>2.3M загрузок</small>
                <small>8.9K звёзд</small>
                <small>Воспроизводимость: 92%</small>
              </div>
            </article>

          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>

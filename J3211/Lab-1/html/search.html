<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LabelFlow – Поиск проектов</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4">
    <div class="container">

        <a class="brand-logo d-flex align-items-center gap-2 text-decoration-none text-dark fs-5 fw-bold" href="dashboard.html">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--lf-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 3h18v18H3z"></path>
                <path d="M8 8h8v8H8z"></path>
            </svg>
            LabelFlow
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center fw-medium">

                <li class="nav-item"><a class="nav-link px-3" href="dashboard.html">Проекты</a></li>
                <li class="nav-item"><a class="nav-link px-3 active" href="search.html">Поиск</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="workers.html">Команда</a></li>

                <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
                    <a href="profile.html" class="d-flex align-items-center text-decoration-none">
                        <div class="rounded-circle text-white d-flex align-items-center justify-content-center shadow-sm"
                             style="width: 38px; height: 38px; background-color: var(--lf-primary); font-size: 0.95rem;">
                            ИИ
                        </div>
                    </a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<main class="container my-4">
    <h1 class="h3 fw-bold mb-4">Поиск проектов</h1>

    <form id="searchForm" class="row g-3 mb-5 p-4 bg-white rounded shadow-sm border">
        <div class="col-md-5">
            <label class="form-label text-muted small fw-bold text-uppercase">Название</label>
            <input type="text" class="form-control" id="searchInput" placeholder="Введите название проекта...">
        </div>
        <div class="col-md-4">
            <label class="form-label text-muted small fw-bold text-uppercase">Тип разметки</label>
            <select class="form-select" id="filterType">
                <option value="">Все типы</option>
                <option value="BBox">Bounding Box</option>
                <option value="Polygon">Сегментация</option>
                <option value="Classification">Классификация</option>
            </select>
        </div>
        <div class="col-md-3 d-flex align-items-end">
            <button type="submit" class="btn btn-primary w-100 me-2">Найти</button>
            <button type="button" class="btn btn-light w-100" id="resetSearchBtn">Сбросить</button>
        </div>
    </form>

    <div class="row g-4" id="searchResults">
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/app.js"></script>
</body>
</html>

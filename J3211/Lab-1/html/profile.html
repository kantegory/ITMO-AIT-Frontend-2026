<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LabelFlow – Профиль</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4">
    <div class="container">

        <a class="brand-logo d-flex align-items-center gap-2 text-decoration-none text-dark fs-5 fw-bold" href="dashboard.html">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--lf-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 3h18v18H3z"></path>
                <path d="M8 8h8v8H8z"></path>
            </svg>
            LabelFlow
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center fw-medium">

                <li class="nav-item"><a class="nav-link px-3" href="dashboard.html">Проекты</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="search.html">Поиск</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="workers.html">Команда</a></li>

                <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
                    <a href="profile.html" class="d-flex align-items-center text-decoration-none">
                        <div class="rounded-circle text-white d-flex align-items-center justify-content-center shadow-sm"
                             style="width: 38px; height: 38px; background-color: var(--lf-primary); font-size: 0.95rem;">
                            ИИ
                        </div>
                    </a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<main class="container my-5">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center">
                <div class="card-body py-5">
                    <div class="rounded-circle text-white d-flex align-items-center justify-content-center mx-auto mb-3" id="profileAvatar" style="width: 96px; height: 96px; background-color: var(--lf-primary); font-size: 2rem; font-weight: 700;">
                        ИИ
                    </div>
                    <h4 class="fw-bold mb-1" id="profileDisplayName">Иван Иванов</h4>
                    <p class="text-muted mb-4" id="profileDisplayEmail">ivan@labelflow.ai</p>
                    <a href="login.html" class="btn btn-outline-danger btn-sm w-100">Выйти из аккаунта</a>
                </div>
            </div>
        </div>

        <div class="col-md-8">

            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-4">Личные данные</h5>
                    <form id="profileForm">
                        <div class="mb-3">
                            <label for="profileName" class="form-label">Полное имя</label>
                            <input type="text" class="form-control" id="profileName" value="Иван Иванов">
                        </div>
                        <div class="mb-4">
                            <label for="profileEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="profileEmail" value="ivan@labelflow.ai">
                        </div>
                        <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                    </form>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-4">Смена пароля</h5>
                    <form id="profilePasswordForm">
                        <div class="mb-3">
                            <label for="currentPassword" class="form-label">Текущий пароль</label>
                            <input type="password" class="form-control" id="currentPassword">
                        </div>
                        <div class="mb-3">
                            <label for="newPassword" class="form-label">Новый пароль</label>
                            <input type="password" class="form-control" id="newPassword">
                        </div>
                        <div class="mb-2">
                            <label for="confirmNewPassword" class="form-label">Повторите новый пароль</label>
                            <input type="password" class="form-control" id="confirmNewPassword">
                        </div>
                        <div class="mb-3">
                            <small id="profilePasswordError" class="text-danger d-none fw-medium">Новые пароли не совпадают.</small>
                            <small id="profilePasswordSuccess" class="text-success d-none fw-medium">Пароль успешно изменен!</small>
                        </div>
                        <button type="submit" class="btn btn-outline-primary">Обновить пароль</button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/app.js"></script>
</body>
</html>

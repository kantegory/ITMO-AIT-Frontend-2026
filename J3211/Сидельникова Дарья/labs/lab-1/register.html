<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime | Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
</head>

<body class="auth-page">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold logo" href="../default.html">PRIME</a>
        </div>
    </nav>

    <section class="auth-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-4 col-md-6">
                    <div class="auth-card">
                        <h3 class="text-center mb-4 text-white">Create Prime Account</h3>

                        <form id="registerForm">
                            <div class="floating-input">
                                <input type="text" id="name" required>
                                <label>Name</label>
                                <small class="error-text" id="nameError"></small>
                            </div>

                            <div class="floating-input">
                                <input type="text" id="email" required>
                                <label>Email</label>
                                <small class="error-text" id="emailError"></small>
                            </div>

                            <div class="floating-input password-container">
                                <input type="password" id="password" required>
                                <label>Password</label>
                                <span class="toggle-password" onclick="togglePassword('password')">👁</span>

                                <div class="password-strength">
                                    <div id="strengthBar"></div>
                                </div>

                                <div class="password-rules">
                                    <p id="ruleLength">• Минимум 8 символов</p>
                                    <p id="ruleNumber">• Хотя бы 1 цифра</p>
                                </div>

                                <small class="error-text" id="passwordError"></small>
                            </div>

                            <div class="floating-input password-container">
                                <input type="password" id="confirmPassword" required>
                                <label>Confirm Password</label>
                                <span class="toggle-password" onclick="togglePassword('confirmPassword')">👁</span>
                                <small class="error-text" id="confirmError"></small>
                            </div>

                            <button type="submit" class="btn btn-light w-100 mt-4">Create Account</button>

                            <div class="text-center mt-3">
                                <small class="text-secondary">
                                    Already have an account?
                                    <a href="login.html">Login</a>
                                </small>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="../../js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

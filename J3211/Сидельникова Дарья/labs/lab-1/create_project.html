<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Project | Prime</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
</head>

<body class="dashboard-page">
    <div class="d-flex">
        <div class="sidebar p-3">
            <h4 class="logo text-white mb-4">
                <a href="dashboard.html" class="text-white text-decoration-none">PRIME</a>
            </h4>

            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="dashboard.html">Dashboard</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="add_task.html">Create new task</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="create_project.html">Create new project</a>
                </li>
                <li class="nav-item mt-4">
                    <a class="nav-link text-secondary" href="../default.html">Logout</a>
                </li>
            </ul>
        </div>

        <div class="main-content flex-grow-1 p-4">
            <h3 class="mb-4">Create Project</h3>

            <div class="card p-4">
                <div class="mb-3">
                    <label class="form-label">Project name</label>
                    <input id="projectName" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Project description</label>
                    <textarea id="projectDescription" class="form-control"></textarea>
                </div>

                <button onclick="createProject()" class="btn btn-dark">Create project</button>

                <hr class="my-4">

                <h6>Invite link</h6>

                <div class="input-group">
                    <input id="inviteLink" class="form-control" readonly>
                    <button onclick="copyInvite()" class="btn btn-outline-dark">Copy</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../js/script.js"></script>
</body>

</html>

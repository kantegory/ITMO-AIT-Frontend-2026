<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
</head>

<body class="auth-page">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold logo" href="../default.html">PRIME</a>
        </div>
    </nav>

    <section class="auth-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-4 col-md-6">
                    <div class="auth-card">
                        <h3 class="text-center mb-4 text-white">Login to Prime</h3>

                        <form>
                            <div class="floating-input">
                                <input type="email" required>
                                <label>Email</label>
                            </div>

                            <div class="floating-input">
                                <input type="password" required>
                                <label>Password</label>
                            </div>

                            <a href="../base/dashboard.html" class="btn btn-light w-100 mt-4">Login</a>

                            <div class="text-center mt-3">
                                <small class="text-secondary">
                                    Don't have an account?
                                    <a href="register.html">Register</a>
                                </small>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

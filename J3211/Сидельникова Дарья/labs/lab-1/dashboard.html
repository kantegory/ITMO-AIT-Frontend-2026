<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
</head>

<body class="dashboard-page">
    <div class="d-flex">
        <div class="sidebar p-3">
            <h4 class="logo text-white mb-4">
                <a href="dashboard.html" class="text-white text-decoration-none">PRIME</a>
            </h4>

            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="dashboard.html">Dashboard</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="add_task.html">Create new task</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="create_project.html">Create new project</a>
                </li>
                <li class="nav-item mt-4">
                    <a class="nav-link text-secondary" href="../default.html">Logout</a>
                </li>
            </ul>
        </div>

        <div class="main-content flex-grow-1 p-4">
            <h3 class="mb-4">Dashboard</h3>

            <div class="card mb-4">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h5 id="userName" class="mb-1"></h5>
                        <p id="userEmail" class="text-muted mb-0"></p>
                    </div>

                    <button class="btn btn-outline-dark btn-sm" onclick="editProfile()">
                        Edit profile
                    </button>
                </div>
            </div>

            <h5 class="mb-3">My Tasks</h5>

            <div class="row g-4 kanban-board">
                <div class="col-md-4">
                    <div class="kanban-column kanban-todo">
                        <h6 class="kanban-title">To Do</h6>
                        <div id="todoTasks"></div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="kanban-column kanban-progress">
                        <h6 class="kanban-title">In Progress</h6>
                        <div id="progressTasks"></div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="kanban-column kanban-done">
                        <h6 class="kanban-title">Done</h6>
                        <div id="doneTasks"></div>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <a href="add_task.html" class="btn btn-dark btn-sm">Add task</a>
            </div>

            <h5 class="mb-3">My Projects</h5>

            <div id="userProjects" class="row g-3"></div>

            <div class="d-flex gap-2 mt-4">
                <a href="create_project.html" class="btn btn-dark">Add project</a>
                <button class="btn btn-outline-dark" onclick="joinProject()">Join project</button>
            </div>
        </div>
    </div>

    <script src="../../js/script.js"></script>
</body>

</html>

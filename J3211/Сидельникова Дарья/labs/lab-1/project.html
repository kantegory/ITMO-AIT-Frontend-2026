<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime | Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
</head>

<body class="dashboard-page">
    <div class="d-flex">
        <div class="sidebar p-3">
            <h4 class="logo text-white mb-4">
                <a href="dashboard.html" class="text-white text-decoration-none">PRIME</a>
            </h4>

            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="dashboard.html">Dashboard</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="add_task.html">Create new task</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="create_project.html">Create new project</a>
                </li>
                <li class="nav-item mt-4">
                    <a class="nav-link text-secondary" href="../default.html">Logout</a>
                </li>
            </ul>
        </div>

        <div class="main-content flex-grow-1 p-4">
            <h3 id="projectTitle" class="mb-4"></h3>
            <p id="projectDescription" class="text-muted mb-4"></p>

            <h5 class="mb-3">Team</h5>
            <ul id="projectTeam" class="list-group mb-4"></ul>

            <h5 class="mb-3">Project Tasks</h5>

            <div class="card mb-4">
                <div class="card-body">
                    <table class="table mb-0">
                        <thead>
                            <tr>
                                <th>Task</th>
                                <th>Project</th>
                                <th>Status</th>
                                <th>Due</th>
                            </tr>
                        </thead>
                        <tbody id="userTasks"></tbody>
                    </table>
                </div>
            </div>

            <div class="mb-4">
                <a href="add_task.html" class="btn btn-dark btn-sm">Add task</a>
            </div>

            <ul id="projectTasks" class="list-group"></ul>
        </div>
    </div>

    <script src="../../js/script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СИСТЕМА_СЧЁТ : РЕГИСТРАЦИЯ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/form.css">
    <link rel="stylesheet" href="css/auth.css">

</head>
<body>

<div class="terminal-wrapper">
    <div class="terminal-box">
        <div class="terminal-title">[ СИСТЕМА_СЧЁТ : РЕГИСТРАЦИЯ ]</div>

        <form id="registerForm">
            <div class="input-group">
                <span class="input-prefix">&gt;</span>
                <label>
                    <input type="email" class="terminal-input" placeholder="TEST@MAIL.COM" required autocomplete="off">
                </label>
            </div>

            <div class="input-group">
                <span class="input-prefix">&gt;</span>
                <label>
                    <input type="password" class="terminal-input" placeholder="ПАРОЛЬ (8 СИМВОЛОВ)" required>
                </label>
            </div>

            <button type="submit" class="terminal-btn" disabled>[ СОЗДАТЬ_АККАУНТ ]</button>
        </form>

        <a href="index.html" class="terminal-link">ЕСТЬ_АККАУНТ? [ ВХОД ]</a>
    </div>
</div>
<script src="js/core.js"></script>
<script src="js/auth.js"></script>
</body>
</html>

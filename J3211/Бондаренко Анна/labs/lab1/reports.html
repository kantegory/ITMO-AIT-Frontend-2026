<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>СИСТЕМА_СЧЁТ : ОТЧЁТЫ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/form.css">
    <link rel="stylesheet" href="css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<nav class="navbar-terminal">
    <div class="navbar-brand">[ СИСТЕМА_СЧЁТ ]</div>
    <div class="nav-links">
        <a href="dashboard.html">ГЛАВНАЯ</a>
        <a href="search.html">ПОИСК</a>
        <a href="reports.html" class="active">ОТЧЁТЫ</a>
        <a href="settings.html">НАСТРОЙКИ</a>
        <a href="index.html">[ ВЫХОД ]</a>
    </div>
</nav>

<div class="container">
    <div class="dashboard-block">
        <div class="block-title">&gt; ПЕРИОД_ОТЧЁТА</div>
        <div class="row g-2">
            <div class="col-md-5">
                <label for="reportMonth"></label><select id="reportMonth" class="terminal-input">
                <option value="1">ЯНВАРЬ</option>
                <option value="2">ФЕВРАЛЬ</option>
                <option value="3">МАРТ</option>
                <option value="4">АПРЕЛЬ</option>
                <option value="5">МАЙ</option>
                <option value="6">ИЮНЬ</option>
                <option value="7">ИЮЛЬ</option>
                <option value="8">АВГУСТ</option>
                <option value="9">СЕНТЯБРЬ</option>
                <option value="10">ОКТЯБРЬ</option>
                <option value="11">НОЯБРЬ</option>
                <option value="12">ДЕКАБРЬ</option>
            </select>
            </div>
            <div class="col-md-5">
                <label for="reportYear"></label><select id="reportYear" class="terminal-input">
            </select>
            </div>
            <div class="col-md-2">
                <button id="applyReportFilters" class="terminal-btn mt-0">[ ОБНОВИТЬ ]</button>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="dashboard-block">
                <div class="block-title">&gt; ДИНАМИКА_БАЛАНСА</div>
                <div style="height: 300px;">
                    <canvas id="balanceChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="dashboard-block" style="min-height: 342px;">
                <div class="block-title">&gt; ПРОГНОЗ</div>

                <div id="forecastDetails" style="text-align: left; font-size: 12px; line-height: 1.6; margin-bottom: 15px;">
                </div>

                <div class="block-title" style="margin-top: 5px;">&gt; ОСТАТОК_ОТ_ДОХОДА</div>
                <div id="remainderBarContainer">
                    <div class="progress" style="height: 35px;">
                        <div id="remainderProgressBar" class="progress-bar bg-income" style="width: 0;">0%</div>
                    </div>
                </div>

                <hr>
                <div id="statusLabel" style="font-weight: 700; text-align: center; text-transform: uppercase; font-size: 13px;">
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="dashboard-block">
                <div class="block-title">&gt; АНАЛИЗ_ДОХОДОВ</div>
                <div id="incomeAnalysisBody"></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="dashboard-block">
                <div class="block-title">&gt; АНАЛИЗ_РАСХОДОВ</div>
                <div id="expenseAnalysisBody"></div>
            </div>
        </div>
    </div>
</div>
<script src="js/core.js"></script>
<script src="js/reports.js"></script>
</body>
</html>

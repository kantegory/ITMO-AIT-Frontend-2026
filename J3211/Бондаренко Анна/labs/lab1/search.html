<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СИСТЕМА_СЧЁТ : ПОИСК</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/form.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

<nav class="navbar-terminal">
    <div class="navbar-brand">[ СИСТЕМА_СЧЁТ ]</div>
    <div class="nav-links">
        <a href="dashboard.html">ГЛАВНАЯ</a>
        <a href="search.html" class="active">ПОИСК</a>
        <a href="reports.html">ОТЧЁТЫ</a>
        <a href="settings.html">НАСТРОЙКИ</a>
        <a href="index.html">[ ВЫХОД ]</a>
    </div>
</nav>

<div class="container">
    <div class="dashboard-block">
        <div class="block-title">&gt; ФИЛЬТРЫ</div>
        <div class="row g-3">

            <div class="col-md-8">
                <div class="input-group mb-0">
                    <span class="input-prefix">&gt; КАТЕГОРИЯ:</span>
                    <label for="searchCategory"></label><select id="searchCategory" class="terminal-input">
                    </select>
                </div>
            </div>
            <div class="col-md-4">
                <button id="resetFilters" class="terminal-btn mt-0" style="width: 100%;">[ СБРОСИТЬ_ФИЛЬТРЫ ]</button>
            </div>

            <div class="col-md-6">
                <div class="input-group mb-0">
                    <span class="input-prefix">ДАТА_ОТ:</span>
                    <label for="filterDateFrom"></label><input type="date" id="filterDateFrom" class="terminal-input">
                </div>
            </div>
            <div class="col-md-6">
                <div class="input-group mb-0">
                    <span class="input-prefix">ДАТА_ДО:</span>
                    <label for="filterDateTo"></label><input type="date" id="filterDateTo" class="terminal-input">
                </div>
            </div>

            <div class="col-md-6">
                <div class="input-group mb-0">
                    <span class="input-prefix">СУММА_ОТ:</span>
                    <label for="filterSumMin"></label><input type="number" step="0.01" id="filterSumMin" class="terminal-input" placeholder="0.00">
                </div>
            </div>
            <div class="col-md-6">
                <div class="input-group mb-0">
                    <span class="input-prefix">СУММА_ДО:</span>
                    <label for="filterSumMax"></label><input type="number" step="0.01" id="filterSumMax" class="terminal-input" placeholder="999999.00">
                </div>
            </div>

        </div>
    </div>

    <div class="dashboard-block">
        <div class="block-title">&gt; РЕЗУЛЬТАТЫ_ПОИСКА</div>

        <table class="terminal-table" id="searchTable">
            <thead>
            <tr>
                <th>ДАТА</th>
                <th>СЧЁТ</th>
                <th>ОПИСАНИЕ</th>
                <th>КАТЕГОРИЯ</th>
                <th>СУММА</th>
            </tr>
            </thead>
            <tbody id="searchResultsBody">
            </tbody>
        </table>

        <div id="emptySearchMessage" style="display: none;">
            [ СОВПАДЕНИЙ_0 ]
        </div>
    </div>
</div>
<script src="js/core.js"></script>
<script src="js/search.js"></script>
</body>
</html>

<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TicketHub — Регистрация</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="auth-page">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">TicketHub</a>
  </div>
</nav>

<main class="auth-wrapper container py-5">
  <section class="auth-card card shadow border-0 rounded-4 mx-auto p-4 p-md-5">
    <header class="text-center mb-4">
      <h1 class="h3 fw-bold">Регистрация</h1>
      <p class="text-secondary mb-0">Создайте аккаунт покупателя билетов</p>
    </header>

    <form id="registerForm" novalidate>
      <div class="row g-3">
        <div class="col-md-6">
          <label for="firstName" class="form-label">Имя</label>
          <input type="text" class="form-control form-control-lg" id="firstName" required>
          <div class="invalid-feedback">Введите имя.</div>
        </div>
        <div class="col-md-6">
          <label for="lastName" class="form-label">Фамилия</label>
          <input type="text" class="form-control form-control-lg" id="lastName" required>
          <div class="invalid-feedback">Введите фамилию.</div>
        </div>
      </div>

      <div class="mt-3">
        <label for="registerEmail" class="form-label">Email</label>
        <input type="email" class="form-control form-control-lg" id="registerEmail" required>
        <div class="invalid-feedback">Введите корректный email.</div>
      </div>

      <div class="mt-3">
        <label for="registerPassword" class="form-label">Пароль</label>
        <input type="password" class="form-control form-control-lg" id="registerPassword" minlength="6" required>
        <div class="invalid-feedback">Пароль должен содержать минимум 6 символов.</div>
      </div>

      <div class="mt-3">
        <label for="role" class="form-label">Тип аккаунта</label>
        <select id="role" class="form-select form-select-lg" required>
          <option value="">Выберите вариант</option>
          <option value="user">Покупатель</option>
          <option value="organizer">Организатор</option>
        </select>
        <div class="invalid-feedback">Выберите тип аккаунта.</div>
      </div>

      <div class="form-check mt-3">
        <input class="form-check-input" type="checkbox" value="" id="agree" required>
        <label class="form-check-label" for="agree">Я согласен с правилами сервиса</label>
        <div class="invalid-feedback">Нужно подтвердить согласие.</div>
      </div>

      <div class="d-grid mt-4">
        <button type="submit" class="btn btn-primary btn-lg">Создать аккаунт</button>
      </div>
    </form>

    <section id="registerAlert" class="mt-3"></section>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/app.js"></script>
</body>
</html>

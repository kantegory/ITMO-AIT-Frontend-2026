<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Транзакции | Финансы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="app-header bg-dark text-white">
        <nav class="container navbar navbar-expand-lg navbar-dark">
            <a class="navbar-brand" href="index.html">Мои Финансы</a>
            <div class="collapse navbar-collapse d-flex justify-content-end">
                <a class="nav-link" href="index.html">Назад на главную</a>
            </div>
        </nav>
    </header>

        <main class="container py-5">
        <h2>История транзакций</h2>
        
        <article class="card p-3 border-0 shadow-sm mb-4">
            <div class="row g-3">
                <div class="col-md-3">
                    <input type="text" id="searchInput" class="form-control" placeholder="Поиск по названию...">
                </div>
                <div class="col-md-3">
                    <select id="accountFilter" class="form-select">
                        <option value="all">Все счета</option>
                        <option value="salary">Зарплатная карта</option>
                        <option value="cash">Наличные</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select id="categoryFilter" class="form-select">
                        <option value="all">Все категории</option>
                        <option value="food">Еда</option>
                        <option value="transport">Транспорт</option>
                        <option value="income">Поступления</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary w-100" onclick="filterTransactions()">Применить фильтр</button>
                </div>
            </div>
        </article>

        <div class="table-wrapper mb-5">
            <table class="table table-hover table-borderless align-middle">
                <thead class="table-light">
                    <tr>
                        <th class="py-3 px-4">Дата</th>
                        <th class="py-3">Счёт</th>
                        <th class="py-3">Описание</th>
                        <th class="py-3">Категория</th>
                        <th class="py-3">Сумма</th>
                    </tr>
                </thead>
                <tbody id="transactionsTable">
                    <tr data-category="food" data-account="salary">
                        <td class="px-4">10.10.2023</td><td>Зарплатная карта</td><td class="fw-bold">Пятерочка</td><td>Еда</td><td class="text-danger">- 1 500 ₽</td>
                    </tr>
                    <tr data-category="income" data-account="salary">
                        <td class="px-4">05.10.2023</td><td>Зарплатная карта</td><td class="fw-bold">Аванс ООО "Рога"</td><td>Поступления</td><td class="text-success">+ 55 000 ₽</td>
                    </tr>
                    <tr data-category="transport" data-account="cash">
                        <td class="px-4">02.10.2023</td><td>Наличные</td><td class="fw-bold">Маршрутка</td><td>Транспорт</td><td class="text-danger">- 100 ₽</td>
                    </tr>
                    <tr data-category="income" data-account="cash">
                        <td class="px-4">01.10.2023</td><td>Наличные</td><td class="fw-bold">Возврат долга</td><td>Поступления</td><td class="text-success">+ 5 000 ₽</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>

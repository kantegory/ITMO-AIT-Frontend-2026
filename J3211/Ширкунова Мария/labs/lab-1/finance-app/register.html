<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | Финансы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <main class="container d-flex justify-content-center align-items-center vh-100">
        <article class="card shadow p-4" style="width: 100%; max-width: 450px;">
            <div class="card-body">
                <h1 class="card-title text-center mb-4 h3">Создать аккаунт</h1>
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="nameInput" class="form-label">Имя</label>
                        <input type="text" class="form-control" id="nameInput" required>
                    </div>
                    <div class="mb-3">
                        <label for="emailInput" class="form-label">Email адрес</label>
                        <input type="email" class="form-control" id="emailInput" required>
                    </div>
                    <div class="mb-3">
                        <label for="passwordInput" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="passwordInput" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">Зарегистрироваться</button>
                    <div class="text-center">
                        <span class="text-muted">Уже есть аккаунт?</span>
                        <a href="login.html" class="text-decoration-none">Войти</a>
                    </div>
                </form>
            </div>
        </article>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1055;">
        <div id="registerToast" class="toast align-items-center text-bg-success border-0 shadow" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-bold">
                    🎉 Регистрация успешна! Входим в кабинет...
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Закрыть"></button>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>

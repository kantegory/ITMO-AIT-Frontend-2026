<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Финансы</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <main class="container d-flex justify-content-center align-items-center vh-100">
        <article class="card shadow p-4" style="width: 100%; max-width: 400px;">
            <div class="card-body">
                <h1 class="card-title text-center mb-4 h3">Вход в систему</h1>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="emailInput" class="form-label">Email адрес</label>
                        <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="passwordInput" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="passwordInput" placeholder="********" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">Войти</button>
                    
                    <div class="text-center">
                        <span class="text-muted">Нет аккаунта?</span>
                        <a href="register.html" class="text-decoration-none">Зарегистрироваться</a>
                    </div>
                </form>
            </div>
        </article>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/main.js"></script>
</body>
</html>

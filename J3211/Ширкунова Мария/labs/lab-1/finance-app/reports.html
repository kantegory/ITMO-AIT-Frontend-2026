<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Отчёты | Финансы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header class="bg-dark p-3 text-white">
        <div class="container d-flex justify-content-between">
            <h4>Отчёты и Бюджеты</h4>
            <a href="index.html" class="text-white">На главную</a>
        </div>
    </header>

    <main class="container py-5">
        <section class="card p-4 shadow-sm mb-4">
            <h5>Использование бюджета (Октябрь)</h5>
            <div class="mt-4">
                <p class="mb-1">Продукты (потрачено 8000 из 10000 ₽)</p>
                <div class="progress mb-3">
                    <div class="progress-bar bg-warning" role="progressbar" style="width: 80%">80%</div>
                </div>

                <p class="mb-1">Развлечения (потрачено 5000 из 5000 ₽)</p>
                <div class="progress mb-3">
                    <div class="progress-bar bg-danger" role="progressbar" style="width: 100%">100%</div>
                </div>

                <p class="mb-1">Транспорт (потрачено 2000 из 6000 ₽)</p>
                <div class="progress mb-3">
                    <div class="progress-bar bg-success" role="progressbar" style="width: 33%">33%</div>
                </div>
            </div>
        </section>
        
        <div class="text-center">
            <a href="integrations.html" class="btn btn-outline-primary">Перейти к интеграциям</a>
        </div>
    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — MokiichukKnowledge</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="style.css?v=3" rel="stylesheet">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="text-center mb-2">
        <a href="index.html" class="text-decoration-none" style="font-size:1.8rem;font-weight:800;color:var(--primary)">
          <i class="bi bi-mortarboard-fill"></i> MokiichukKnowledge
        </a>
      </div>
      <h2 class="text-center">Создать аккаунт</h2>
      <p class="text-center">Присоединяйтесь к 50 000+ студентов</p>

      <form id="registerForm" novalidate>
        <div class="mb-3">
          <label class="form-label" for="regName">Имя и фамилия</label>
          <input type="text" class="form-control" id="regName" placeholder="Иван Иванов" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="regEmail">Email</label>
          <input type="email" class="form-control" id="regEmail" placeholder="example@mail.ru" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="regPassword">Пароль</label>
          <div class="input-group">
            <input type="password" class="form-control" id="regPassword" placeholder="Минимум 6 символов" required style="border-right:none">
            <button class="btn toggle-password" type="button" style="border:2px solid var(--gray-200);border-left:none;border-radius:0 8px 8px 0;background:var(--white)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label" for="regConfirmPassword">Повторите пароль</label>
          <div class="input-group">
            <input type="password" class="form-control" id="regConfirmPassword" placeholder="Повторите пароль" required style="border-right:none">
            <button class="btn toggle-password" type="button" style="border:2px solid var(--gray-200);border-left:none;border-radius:0 8px 8px 0;background:var(--white)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Я хочу:</label>
          <div class="d-flex gap-3">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="role" id="roleStudent" value="student" checked>
              <label class="form-check-label" for="roleStudent">Учиться</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="role" id="roleTeacher" value="teacher">
              <label class="form-check-label" for="roleTeacher">Преподавать</label>
            </div>
          </div>
        </div>
        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" id="agreeTerms" required>
          <label class="form-check-label" for="agreeTerms" style="font-size:0.85rem">
            Я принимаю <a href="#" class="text-decoration-none fw-bold">условия использования</a> и <a href="#" class="text-decoration-none fw-bold">политику конфиденциальности</a>
          </label>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">Зарегистрироваться</button>
      </form>

      <div class="auth-divider">или</div>

      <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2" onclick="showToast('Регистрация через VK (заглушка)','info')">
        <i class="bi bi-chat-fill"></i> Через VK
      </button>

      <p class="text-center mt-4 mb-0" style="font-size:0.9rem">
        Уже есть аккаунт? <a href="login.html" class="fw-bold text-decoration-none">Войдите</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="main.js?v=3"></script>
</body>
</html>

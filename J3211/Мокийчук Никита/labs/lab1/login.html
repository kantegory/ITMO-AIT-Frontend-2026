<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — MokiichukKnowledge</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="style.css?v=3" rel="stylesheet">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="text-center mb-2">
        <a href="index.html" class="text-decoration-none" class="auth-logo">
          <i class="bi bi-mortarboard-fill"></i> MokiichukKnowledge
        </a>
      </div>
      <h2 class="text-center">Вход в аккаунт</h2>
      <p class="text-center">Рады видеть вас снова!</p>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label class="form-label" for="loginEmail">Email</label>
          <input type="email" class="form-control" id="loginEmail" placeholder="example@mail.ru" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="loginPassword">Пароль</label>
          <div class="input-group">
            <input type="password" class="form-control" id="loginPassword" placeholder="Введите пароль" required class="input-no-right-border">
            <button class="btn toggle-password" type="button" class="toggle-password-btn">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label" for="rememberMe" class="text-sm-2">Запомнить меня</label>
          </div>
          <a href="#" class="text-decoration-none" class="auth-link" data-bs-toggle="modal" data-bs-target="#resetModal">Забыли пароль?</a>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">Войти</button>
      </form>

      <div class="auth-divider">или</div>

      <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2" onclick="showToast('Вход через VK (заглушка)','info')">
        <i class="bi bi-chat-fill"></i> Войти через VK
      </button>

      <p class="text-center mt-4 mb-0 text-sm-2">
        Нет аккаунта? <a href="register.html" class="fw-bold text-decoration-none">Зарегистрируйтесь</a>
      </p>
    </div>
  </div>

  <div class="modal fade" id="resetModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Сброс пароля</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p class="text-muted mb-3">Введите email, и мы отправим вам ссылку для восстановления.</p>
          <input type="email" class="form-control" placeholder="Ваш email" id="resetEmail">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
          <button type="button" class="btn btn-primary" onclick="
            const email = document.getElementById('resetEmail').value;
            if(email){ showToast('Письмо отправлено на '+email,'success'); bootstrap.Modal.getInstance(document.getElementById('resetModal')).hide(); }
            else { showToast('Введите email','danger'); }
          ">Отправить</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="main.js?v=3"></script>
</body>
</html>

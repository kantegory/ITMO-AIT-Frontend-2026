<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TicketHub | Личный кабинет</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-layout d-flex flex-column min-vh-100">
    <header class="navbar navbar-expand-lg bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="index.html">TicketHub</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Переключить меню">
          <span class="navbar-toggler-icon"></span>
        </button>
        <nav class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Мероприятия</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="organizer.html">Кабинет организатора</a>
            </li>
          </ul>
          <div class="d-flex gap-2">
            <a class="btn btn-outline-primary btn-sm" href="login.html">Вход</a>
            <a class="btn btn-primary btn-sm" href="register.html">Регистрация</a>
            <a class="btn btn-outline-secondary btn-sm active" href="profile.html">Личный кабинет</a>
          </div>
        </nav>
      </div>
    </header>

    <main class="flex-grow-1">
      <section class="page container py-4">
        <header class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h1 class="h4 mb-1">Личный кабинет</h1>
            <p class="text-secondary mb-0" id="profileEmail"></p>
          </div>
          <a class="btn btn-outline-danger btn-sm" href="index.html" id="logoutButton">Выйти</a>
        </header>

        <section class="mb-4">
          <h2 class="h6 mb-2">Купленные билеты</h2>
          <div id="ticketsList" class="row g-3"></div>
          <p class="text-secondary small mb-0" id="noTicketsText">Вы ещё не покупали билеты.</p>
        </section>
      </section>
    </main>

    <footer class="border-top bg-light mt-4">
      <div class="container py-3">
        <p class="mb-0 small text-secondary">2026 TicketHub</p>
      </div>
    </footer>
  </div>

  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1080;">
    <div id="actionToast" class="toast align-items-center text-bg-primary border-0" role="status" aria-live="polite" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="toastBody">Действие выполнено</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Закрыть"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — ProjectHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="index.html">ProjectHub</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Меню">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
          <li class="nav-item"><a class="nav-link active" href="login.html">Вход</a></li>
          <li class="nav-item"><a class="nav-link" href="register.html">Регистрация</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="auth-wrapper">
    <div class="container">
      <div class="auth-card card shadow mx-auto p-4">
        <h2 class="text-center mb-4">Вход в аккаунт</h2>
        <form id="login-form">
          <div class="mb-3">
            <label for="login-email" class="form-label">Email</label>
            <input type="email" class="form-control" id="login-email" placeholder="name@example.com" required>
          </div>
          <div class="mb-3">
            <label for="login-password" class="form-label">Пароль</label>
            <input type="password" class="form-control" id="login-password" required>
          </div>
          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="login-remember">
            <label class="form-check-label" for="login-remember">Запомнить меня</label>
          </div>
          <button type="submit" class="btn btn-primary w-100">Войти</button>
        </form>
        <p class="text-center mt-3 mb-0 small text-muted">
          Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
        </p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>

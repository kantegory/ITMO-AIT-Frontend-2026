<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — ProjectHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="index.html">ProjectHub</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Меню">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Вход</a></li>
          <li class="nav-item"><a class="nav-link active" href="register.html">Регистрация</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="auth-wrapper">
    <div class="container">
      <div class="auth-card card shadow mx-auto p-4">
        <h2 class="text-center mb-4">Регистрация</h2>
        <form id="register-form">
          <div class="mb-3">
            <label for="reg-name" class="form-label">Имя</label>
            <input type="text" class="form-control" id="reg-name" placeholder="Иван Иванов" required>
          </div>
          <div class="mb-3">
            <label for="reg-email" class="form-label">Email</label>
            <input type="email" class="form-control" id="reg-email" placeholder="name@example.com" required>
          </div>
          <div class="mb-3">
            <label for="reg-password" class="form-label">Пароль</label>
            <input type="password" class="form-control" id="reg-password" required minlength="6">
            <div class="form-text">Минимум 6 символов.</div>
          </div>
          <div class="mb-3">
            <label for="reg-password-confirm" class="form-label">Подтверждение пароля</label>
            <input type="password" class="form-control" id="reg-password-confirm" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
        </form>
        <p class="text-center mt-3 mb-0 small text-muted">
          Уже есть аккаунт? <a href="login.html">Войти</a>
        </p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>

<!doctype html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stepik-style Auth</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="sign-in.css" />

</head>

<body>
  <div class="auth-card">
    <div class="tab-buttons">
      <button class="active">Вход</button>
      <a href="registration.html"><button>Регистрация</button></a>
    </div>

    <form id="loginForm" novalidate>
      <div class="form-floating mb-3">
        <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required>
        <label for="loginEmail">E-mail</label>
        <div class="invalid-feedback">Введите корректный email</div>
      </div>
      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="loginPassword" placeholder="Пароль" required>
        <label for="loginPassword">Пароль</label>
        <div class="invalid-feedback">Пароль не может быть пустым</div>
      </div>
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" value="remember-me" id="loginRemember">
        <label class="form-check-label" for="loginRemember">Запомнить меня</label>
      </div>
      <button class="btn btn-primary w-100 py-2 mb-3" type="submit">Войти</button>
      <div class="text-center mb-0">
        <a href="#">Напомнить пароль</a>
      </div>
    </form>
  </div>
</body>

</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Курсы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="navbar navbar-dark bg-dark py-3">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="index.html">TopCourses</a>
        <button onclick="goToProfile()" class="btn btn-outline-light">В кабинет</button>
    </div>
</header>

<main class="container py-4">
    <nav class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none">Каталог</a></li>
            <li class="breadcrumb-item active" id="courseName"></li>
        </ol>
    </nav>

    <div class="row">
        <div class="col-lg-8">
            <div class="ratio ratio-16x9 video mb-4">
                <div class="video-content">
                    <div class="text-center">
                        <div class="display-4">▶</div>
                        <h4 id="videoTitle" class="fw-bold mt-2"></h4>
                    </div>
                </div>
            </div>

            <div class="card border-0 p-4 mb-4">
                <h3 class="fw-bold mb-3" id="lessonHeader"></h3>
                <p class="text-muted mb-0" id="lessonDesc"></p>

                <hr>

                <h6 class="fw-bold mb-3">Материалы к уроку:</h6>
                <div class="d-flex flex-wrap gap-2 mb-4" id="materials"></div>

                <div class="p-3 bg-light border-start border-4 border-danger rounded">
                    <h6 class="fw-bold text-danger">Практическое задание:</h6>
                    <small id="lessonTask"></small>
                </div>
            </div>

            <div class="card border-0 p-4 mb-4">
                <h5 class="fw-bold mb-4">Обсуждение</h5>
                <small class="mb-4 text-muted" id="comments">Вопросов пока нет. Будьте первым!</small>

                <div class="input-group">
                    <input type="text" class="form-control" id="comment" placeholder="Ваш вопрос">
                    <button class="btn btn-primary" onclick="addComment()">Отправить</button>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card border-0">
                <div class="card-header bg-white fw-bold py-3">Программа курса</div>

                <div class="list-group list-group-flush" id="lessons"></div>

                <div class="card-footer bg-white p-3">
                    <button class="btn btn-success w-100 fw-bold" onclick="alert('Урок отмечен как пройденный!')">Завершить урок</button>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>

<script>
    function goToProfile() {
        const user = getCurrentUser();

        if (!user) {
            window.location.href = "login.html";
            return;
        }

        if (user.role === 'teacher') {
            window.location.href = "teacher.html";
        } else {
            window.location.href = "profile.html";
        }
    }

    document.addEventListener("DOMContentLoaded", function() {
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = parseInt(urlParams.get('id')) || 101;
        const lessonIndex = parseInt(urlParams.get('lesson')) || 0;

        const course = data.courses.find(course => course.id === courseId);
        if (!course) {
            return;
        }

        const lesson = course.lessons[lessonIndex];

        document.getElementById('courseName').innerText = course.title;
        document.getElementById('videoTitle').innerText = lesson.title;
        document.getElementById('lessonHeader').innerText = lesson.title;
        document.getElementById('lessonDesc').innerText = lesson.description;
        document.getElementById('lessonTask').innerText = lesson.task;

        const materials = document.getElementById('materials');
        materials.innerHTML = lesson.materials.map(material => `
            <button class="btn btn-light border" onclick="alert('Скачивание: ${material}')">${material}</button>
        `).join('');

        const menu = document.getElementById('lessons');
        menu.innerHTML = course.lessons.map((lesson, index) => {
            const isActive = (index === lessonIndex) ? 'active' : '';
            return `
                <a href="course.html?id=${courseId}&lesson=${index}" class="list-group-item list-group-item-action ${isActive}">
                    <small class="fw-bold text-muted">${lesson.title}</small>
                </a>
            `;
        }).join('');
    });


    function addComment() {
        const input = document.getElementById('comment');
        const list = document.getElementById('comments');
        const user = getCurrentUser();

        if (input.value.trim()) {
            if (list.innerText.includes('пока нет')) {
                list.innerHTML = '';
            }
            const name = user ? user.name : "Гость";
            list.innerHTML += `<div class="mb-2"><strong>${name}:</strong> ${input.value}</div>`;
            input.value = "";
        }
    }
</script>

</body>
</html>

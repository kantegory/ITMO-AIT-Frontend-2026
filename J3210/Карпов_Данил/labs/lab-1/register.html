<!DOCTYPE html>
<html lang="ru" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Minion Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="card auth-card">
            <div class="text-center mb-4">
                <i class="bi bi-mortarboard-fill text-primary" style="font-size: 3rem;"></i>
                <h2 class="mt-2">Регистрация в <span class="brand-minion">Minion</span> <span class="brand-courses">Courses</span></h2>
                <p class="text-muted">Создайте аккаунт для начала обучения</p>
            </div>
            
            <form class="needs-validation" novalidate>
                <div class="mb-3">
                    <label for="name" class="form-label">Имя</label>
                    <input type="text" class="form-control" id="name" placeholder="Иван Иванов" required>
                    <div class="invalid-feedback">Введите ваше имя</div>
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="example@mail.ru" required>
                    <div class="invalid-feedback">Введите корректный email</div>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" class="form-control" id="password" placeholder="Минимум 6 символов" required minlength="6">
                    <div class="invalid-feedback">Пароль должен содержать минимум 6 символов</div>
                </div>
                
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Подтвердите пароль</label>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Повторите пароль" required>
                    <div class="invalid-feedback">Пароли должны совпадать</div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Тип аккаунта</label>
                    <div class="d-flex gap-3">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="accountType" id="student" value="student" checked>
                            <label class="form-check-label" for="student">Студент</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="accountType" id="teacher" value="teacher">
                            <label class="form-check-label" for="teacher">Преподаватель</label>
                        </div>
                    </div>
                </div>
                
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="terms" required>
                    <label class="form-check-label" for="terms">
                        Я согласен с <a href="#" class="text-primary">условиями использования</a>
                    </label>
                    <div class="invalid-feedback">Необходимо принять условия</div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mb-3">Зарегистрироваться</button>
                
                <div class="text-center">
                    <span class="text-muted">Уже есть аккаунт?</span>
                    <a href="login.html" class="text-primary text-decoration-none">Войти</a>
                </div>
            </form>
            
            <div class="text-center mt-4">
                <span class="theme-toggle" onclick="toggleTheme()">
                    <i class="bi bi-moon-fill" id="themeIcon"></i>
                </span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Models | Pipes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

</head>
<body>


    <div class="app-layout d-flex">

    <aside class="d-flex flex-column flex-shrink-0 p-4 bg-body-tertiary border-end"
           style="width:260px; min-height:100vh;">

        <a href="dashboard.html"
           class="d-flex align-items-center mb-4 text-decoration-none">

            <span class="fs-4 fw-bold">
                Pipes
            </span>

        </a>

        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item mb-2">
                <a href="dashboard.html" class="nav-link link-body-emphasis">
                    Home
                </a>
            </li>

            <li class="mb-2">
                <a href="experiments.html" class="nav-link link-body-emphasis">
                    Experiments
                </a>
            </li>

            <li class="mb-2">
                <a href="models.html" class="nav-link active">
                    Model Registry
                </a>
            </li>
        </ul>


        <div class="mt-auto">

            <hr>

            <div class="dropdown">

                <a href="#"
                class="d-flex align-items-center text-decoration-none dropdown-toggle"
                data-bs-toggle="dropdown">

                    <img src="https://github.com/mdo.png"
                        width="32"
                        height="32"
                        class="rounded-circle me-2">

                    <strong>User</strong>

                </a>

                <ul class="dropdown-menu text-small shadow">
                    <li>
                        <a class="dropdown-item" href="#">
                            Settings
                        </a>
                    </li>

                    <li>
                        <hr class="dropdown-divider">
                    </li>

                    <li>
                        <a class="dropdown-item text-danger" href="index.html">
                            Sign out
                        </a>
                    </li>
                </ul>

            </div>
        </div>

    </aside>



    <main class="flex-grow-1 p-4">

        <header class="d-flex justify-content-between align-items-center mb-4">

            <h1>Registered Models</h1>

            <button class="btn btn-primary"
                    data-bs-toggle="modal"
                    data-bs-target="#createModelModal">
                Create Model
            </button>

        </header>


        <section class="card mb-4">

            <div class="card-body">

                <div class="input-group">

                    <input type="text"
                        class="form-control"
                        placeholder="Search registered models">

                    <button class="btn btn-outline-secondary">
                        Search
                    </button>

                </div>

            </div>

        </section>


        <section class="card">

            <div class="table-responsive">

                <table class="table table-hover align-middle mb-0">

                    <thead class="table-light">

                        <tr>

                            <th>Name</th>

                            <th>Latest Version</th>

                            <th>Aliased Versions</th>

                            <th>Created By</th>

                            <th>Last Modified</th>

                            <th>Tags</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr>

                            <td>
                                <a href="model_entity.html"
                                class="text-decoration-none fw-semibold">
                                    DetectionModel
                                </a>
                            </td>

                            <td>v5</td>

                            <td>
                                <span class="badge bg-success">
                                    Production
                                </span>
                            </td>

                            <td>Artem</td>

                            <td>15 Mar 2026</td>

                            <td>

                                <span class="badge bg-primary">
                                    xgboost
                                </span>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </section>


        <nav class="mt-4 d-flex justify-content-between align-items-center">

            <span class="text-muted">
                Showing 1-1 of 1 models
            </span>

            <ul class="pagination mb-0">
                <li class="page-item disabled">
                    <a class="page-link">Previous</a>
                </li>

                <li class="page-item active">
                    <a class="page-link">1</a>
                </li>

                <li class="page-item disabled">
                    <a class="page-link">Next</a>
                </li>
            </ul>

        </nav>

    </main>


<div class="modal fade" id="createModelModal" tabindex="-1">

    <div class="modal-dialog modal-dialog-centered modal-dialog-custom">

        <div class="modal-content rounded-4 shadow">

            <div class="modal-header">
                <h5 class="modal-title">
                    Create New Model
                </h5>

                <button class="btn-close"
                        data-bs-dismiss="modal">
                </button>
            </div>

            <div class="modal-body">

                <form>

                    <div class="mb-3">
                        <label class="form-label">
                            Model Name
                        </label>

                        <input type="text"
                               class="form-control">
                    </div>


                    <div class="mb-3">
                        <label class="form-label">
                            Description
                        </label>

                        <textarea class="form-control"
                                  rows="3">
                        </textarea>
                    </div>


                    <button class="btn btn-primary w-100">
                        Create
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

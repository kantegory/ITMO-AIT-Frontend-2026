<!doctype html>
<html lang="en">

    <title>Model | Pipes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="app-layout d-flex">

    <aside class="d-flex flex-column flex-shrink-0 p-4 bg-body-tertiary border-end"
           style="width:260px; min-height:100vh;">

        <a href="dashboard.html"
           class="d-flex align-items-center mb-4 text-decoration-none">

            <span class="fs-4 fw-bold">
                Pipes
            </span>

        </a>

        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item mb-2">
                <a href="dashboard.html" class="nav-link link-body-emphasis">
                    Home
                </a>
            </li>

            <li class="mb-2">
                <a href="experiments.html" class="nav-link link-body-emphasis">
                    Experiments
                </a>
            </li>

            <li class="mb-2">
                <a href="models.html" class="nav-link active">
                    Model Registry
                </a>
            </li>
        </ul>


        <div class="mt-auto">

            <hr>

            <div class="dropdown">

                <a href="#"
                class="d-flex align-items-center text-decoration-none dropdown-toggle"
                data-bs-toggle="dropdown">

                    <img src="https://github.com/mdo.png"
                        width="32"
                        height="32"
                        class="rounded-circle me-2">

                    <strong>User</strong>

                </a>

                <ul class="dropdown-menu text-small shadow">
                    <li>
                        <a class="dropdown-item" href="#">
                            Settings
                        </a>
                    </li>

                    <li>
                        <hr class="dropdown-divider">
                    </li>

                    <li>
                        <a class="dropdown-item text-danger" href="index.html">
                            Sign out
                        </a>
                    </li>
                </ul>

            </div>
        </div>

    </aside>


    <main class="flex-grow-1 p-4">


        <header class="mb-4">

            <h1>DetectionModel</h1>

            <div class="text-muted">
                Created: 15 Mar 2026
            </div>

        </header>


        <section class="row mb-4">

            <div class="col-md-4">

                <div class="card text-center h-90">

                    <div class="card-body">

                        <h5 class="card-title">Best Metric</h5>

                        <p class="display-6 fw-semibold">
                            ROC-AUC
                        </p>

                        <p class="text-muted">
                            0.964
                        </p>

                    </div>

                </div>

            </div>


            <div class="col-md-4">

                <div class="card text-center h-90">

                    <div class="card-body">

                        <h5 class="card-title">Total Versions</h5>

                        <p class="display-6 fw-semibold">
                            1
                        </p>

                    </div>

                </div>

            </div>


            <div class="col-md-4">

                <div class="card text-center h-90">

                    <div class="card-body">

                        <h5 class="card-title">Stage</h5>

                        <span class="badge bg-success fs-6">
                            Production
                        </span>

                    </div>

                </div>

            </div>

        </section>


        <section class="card">

            <div class="card-header">
                Model Versions
            </div>

            <div class="table-responsive">

                <table class="table table-hover mb-0">

                    <thead class="table-light">

                    <tr>

                        <th>Version</th>

                        <th>Metric</th>

                        <th>Status</th>

                        <th>Registered</th>

                        <th>Details</th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr>

                        <td>v1</td>

                        <td>0.964</td>

                        <td>
                            <span class="badge bg-success">
                                Production
                            </span>
                        </td>

                        <td>15 Mar 2026</td>

                        <td>
                            <button class="btn btn-sm btn-outline-secondary">
                                View
                            </button>
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

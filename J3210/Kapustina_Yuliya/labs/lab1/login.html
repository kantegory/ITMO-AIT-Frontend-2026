<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Вход</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            background: linear-gradient(120deg, #ffda9e, #f8b8a4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 420px;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .btn-main {
            background: #ff7043;
            color: white;
        }

        .btn-main:hover {
            background: #f4511e;
        }

        .btn-outline-main {
            border: 1px solid #ff7043;
            color: #ff7043;
            background: transparent;
        }

        .btn-outline-main:hover {
            background: #ff7043;
            color: white;
        }
    </style>

</head>

<body>

    <div class="card login-card">

        <div class="card-body p-4">

            <h3 class="text-center mb-4">Вход</h3>

            <form>

                <div class="mb-3">

                    <label class="form-label">Email</label>

                    <input type="email" class="form-control" placeholder="example@email.com">

                </div>

                <div class="mb-3">

                    <label class="form-label">Пароль</label>

                    <input type="password" class="form-control" placeholder="Введите пароль">

                </div>

                <div class="mb-3 form-check">

                    <input type="checkbox" class="form-check-input">

                    <label class="form-check-label">Запомнить меня</label>

                </div>

                <button class="btn btn-main w-100 mb-3">
                    Войти
                </button>

            </form>

            <div class="text-center mb-3">

                <a href="#" class="text-decoration-none">
                    Забыли пароль?
                </a>

            </div>

            <hr>

            <div class="text-center">

                <p>Нет аккаунта?</p>

                <a href="register.html" class="btn btn-outline-main w-100">
                    Регистрация
                </a>

            </div>

        </div>

    </div>

</body>

</html>

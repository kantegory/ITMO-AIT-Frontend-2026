<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Регистрация</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(120deg, #ffda9e, #f8b8a4);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 15px;
        }

        .register-card {
            max-width: 500px;
            width: 100%;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .btn-main {
            background: #ff7043;
            color: white;
        }

        .btn-main:hover {
            background: #f4511e;
        }
    </style>

</head>

<body>

    <main>

        <section class="card register-card">

            <header class="card-body text-center pb-0">

                <h2>Создать аккаунт</h2>
                <p class="text-muted">Присоединяйтесь к сообществу фанфиков</p>

            </header>

            <section class="card-body">

                <form>

                    <section class="mb-3">

                        <label class="form-label">Имя пользователя</label>

                        <input type="text" class="form-control" placeholder="Введите ник" required>

                    </section>


                    <section class="mb-3">

                        <label class="form-label">Email</label>

                        <input type="email" class="form-control" placeholder="example@email.com" required>

                    </section>


                    <section class="mb-3">

                        <label class="form-label">Пароль</label>

                        <input type="password" class="form-control" placeholder="Введите пароль" required>

                    </section>


                    <section class="mb-3">

                        <label class="form-label">Подтверждение пароля</label>

                        <input type="password" class="form-control" placeholder="Повторите пароль" required>

                    </section>


                    <section class="mb-3">

                        <label class="form-label">Аватар (необязательно)</label>

                        <input type="file" class="form-control">

                    </section>


                    <section class="form-check mb-3">

                        <input type="checkbox" class="form-check-input" required>

                        <label class="form-check-label">

                            Я принимаю
                            <a href="user_agreement.txt" target="_blank">пользовательское соглашение</a>

                        </label>

                    </section>


                    <footer>

                        <button class="btn btn-main w-100 mb-3">
                            Зарегистрироваться
                        </button>

                    </footer>

                </form>


                <hr>

                <p class="text-center">

                    Уже есть аккаунт?

                    <a href="login.html">
                        Войти
                    </a>

                </p>

            </section>

        </section>

    </main>

</body>

</html>

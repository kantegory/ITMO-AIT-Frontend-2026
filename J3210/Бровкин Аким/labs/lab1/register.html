<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация - EduPlatform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-4">
                    <div class="edu-card p-4">
                        <h3 class="text-center mb-4">Создание аккаунта</h3>
                        <form action="dashboard.html">
                            <div class="mb-3">
                                <label class="form-label">Имя и Фамилия</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Пароль</label>
                                <input type="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn-brand w-100" style="background-color: #27ae60;">Зарегистрироваться</button>
                        </form>
                        <div class="text-center mt-3">
                            <a href="index.html">Уже есть аккаунт? Войти</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

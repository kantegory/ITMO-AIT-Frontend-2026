<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет - EduPlatform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar mb-4">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">EduPlatform</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="dashboard.html">Мои курсы</a></li>
                    <li class="nav-item"><a class="nav-link" href="search.html">Поиск курсов</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <span class="text-light me-3">Иван Иванов</span>
                    <a href="index.html" class="btn btn-outline-light btn-sm">Выйти</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Личный кабинет</h2>
        <div class="row" id="courseListRow">
            
            <div class="col-md-6 mb-4">
                <div class="edu-card course-card p-3 h-100">
                    <h5 class="card-title">Frontend-разработка с нуля</h5>
                    <p class="card-text text-muted">Пройдено: 15 из 30 уроков</p>
                    <div class="progress mb-3" style="height: 20px;">
                        <div class="progress-bar bg-success progress-bar-striped progress-bar-animated" role="progressbar" style="width: 50%;">50%</div>
                    </div>
                    <button class="btn-brand btn-sm">Продолжить обучение</button>
                </div>
            </div>
            <div class="col-md-6 mb-4" id="findMoreCardPlaceholder">
                <div class="edu-card course-card p-3 border rounded text-center d-flex flex-column justify-content-center h-100" style="border-style: dashed !important; background: transparent;">
                    <p class="text-muted">Хотите изучить что-то новое?</p>
                    <a href="search.html" class="btn btn-outline-primary">Найти новый курс</a>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const findMoreCard = document.getElementById('findMoreCardPlaceholder');
            const myCourses = JSON.parse(localStorage.getItem('myCourses')) || [];

            myCourses.forEach(courseTitle => {
                const cardHtml = `
                    <div class="col-md-6 mb-4">
                        <div class="edu-card course-card p-3 h-100 d-flex flex-column">
                            <h5 class="card-title">${courseTitle}</h5>
                            <p class="card-text text-muted">Статус: Доступ открыт</p>
                            <div class="progress mb-3" style="height: 20px;">
                                <div class="progress-bar bg-info" role="progressbar" style="width: 0%;">0%</div>
                            </div>
                            <div class="mt-auto">
                                <button class="btn-brand btn-sm">Начать обучение</button>
                            </div>
                        </div>
                    </div>
                `;
                findMoreCard.insertAdjacentHTML('beforebegin', cardHtml);
            });
        });
    </script>
</body>
</html>

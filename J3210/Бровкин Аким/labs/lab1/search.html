<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Поиск курсов - EduPlatform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">EduPlatform</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Мои курсы</a></li>
                    <li class="nav-item"><a class="nav-link active" href="search.html">Поиск курсов</a></li>
                </ul>
                <a href="index.html" class="btn btn-outline-light btn-sm">Выйти</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-3">
                <div class="filter-sidebar mb-4">
                    <h5>Фильтры</h5>
                    <hr>
                    <div class="mb-3">
                        <label class="form-label">Предмет</label>
                        <select class="form-select">
                            <option>Все</option>
                            <option>Программирование</option>
                            <option>Дизайн</option>
                        </select>
                    </div>
                    <button class="btn-brand w-100">Применить</button>
                </div>
            </div>

            <div class="col-md-9">
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <div class="edu-card course-card p-3 h-100 d-flex flex-column">
                            <h5 class="card-title">React для продвинутых</h5>
                            <p class="card-text text-muted">Изучите хуки, Redux Toolkit и роутинг.</p>
                            <div class="mt-auto d-flex justify-content-between align-items-center">
                                <span class="course-price">4990 ₽</span>
                                <button class="btn-brand" data-bs-toggle="modal" data-bs-target="#buyModal">Купить</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="buyModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content edu-card">
                <div class="modal-header border-0">
                    <h5 class="modal-title">Подтверждение покупки</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Вы уверены, что хотите приобрести курс "React для продвинутых" за 4990 ₽?
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn-brand" data-bs-dismiss="modal" onclick="alert('Курс добавлен!')">Подтвердить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

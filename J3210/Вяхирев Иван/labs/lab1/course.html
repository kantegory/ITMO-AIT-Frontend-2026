<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css">
    <title>Курс</title>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
        <a class="navbar-brand" href="search.html">Курсы</a>
        <a class="nav-link text-white" href="search.html">Поиск</a>
        <a class="nav-link text-white" href="#" onclick="goProfile()">Личный кабинет</a>
    </nav>
    <br><br>

    <div class="container">
        <div class="row">
            <div class="col-md-8">
                <h1 id="cTitle">Название</h1>
                <p id="cLevel" class="text-muted">Уровень</p>
                <br>
                <div class="bg-secondary text-white p-5 text-center">
                    <h4>Плеер видео-лекции</h4>
                    <p id="cVideo">Ссылка: </p>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body text-center">
                        <h3 id="cPrice">Цена</h3>
                        <br>
                        <button class="btn btn-success btn-block btn-lg" onclick="buy()">Купить курс</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function goProfile() {
            let data = localStorage.getItem("current_user");
            if (data === null) { window.location.href = "login.html"; } 
            else {
                let user = JSON.parse(data);
                if (user.role === "student") { window.location.href = "profile.html"; } 
                else { window.location.href = "teacher.html"; }
            }
        }

        let data = localStorage.getItem("currentCourse");
        let course = JSON.parse(data);

        document.getElementById("cTitle").innerText = course.title;
        document.getElementById("cLevel").innerText = "Уровень: " + course.level;
        document.getElementById("cPrice").innerText = course.price + " руб.";
        document.getElementById("cVideo").innerText = "Ссылка: " + course.video;

        function buy() {
            let bData = localStorage.getItem("bought_courses");
            let bought = [];
            if (bData !== null) { bought = JSON.parse(bData); }
            bought.push(course);
            localStorage.setItem("bought_courses", JSON.stringify(bought));
            
            alert("Успешно куплено!");
            goProfile();
        }
    </script>
  </body>
</html>

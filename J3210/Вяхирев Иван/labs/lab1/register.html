<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css">
    <title>Регистрация</title>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
        <a class="navbar-brand" href="search.html">Курсы</a>
        <a class="nav-link text-white" href="search.html">Поиск</a>
        <a class="nav-link text-white" href="#" onclick="goProfile()">Личный кабинет</a>
        <a class="btn btn-light" href="login.html">Вход</a>
    </nav>
    <br><br>

    <div class="container">
        <div class="row">
            <div class="col-md-4 offset-md-4">
                <div class="card">
                    <div class="card-body">
                        <h3>Регистрация</h3>
                        <br>
                        <label>Логин (Ваше имя)</label>
                        <input id="regLogin" class="form-control">
                        <br>
                        <label>Тип аккаунта</label>
                        <select id="regRole" class="form-control">
                            <option value="student">Я Студент</option>
                            <option value="teacher">Я Преподаватель</option>
                        </select>
                        <br>
                        <label>Придумайте пароль</label>
                        <input id="regPass" type="password" class="form-control">
                        <br>
                        <button class="btn btn-primary btn-block" onclick="doRegister()">Создать аккаунт</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function goProfile() {
            let data = localStorage.getItem("current_user");
            if (data === null) {
                alert("Сначала нужно войти!");
                window.location.href = "login.html";
            } else {
                let user = JSON.parse(data);
                if (user.role === "student") {
                    window.location.href = "profile.html";
                } else {
                    window.location.href = "teacher.html";
                }
            }
        }

        function doRegister() {
            let login = document.getElementById("regLogin").value;
            let role = document.getElementById("regRole").value;
            let pass = document.getElementById("regPass").value;

            let usersData = localStorage.getItem("all_users");
            let usersArray = [];
            if (usersData !== null) {
                usersArray = JSON.parse(usersData);
            }

            let isExist = false;
            for (let i = 0; i < usersArray.length; i++) {
                if (usersArray[i].login === login) {
                    isExist = true;
                }
            }

            if (isExist === true) {
                alert("Ошибка! Пользователь с таким логином уже существует.");
            } else {
                let newUser = { login: login, password: pass, role: role };
                usersArray.push(newUser);
                localStorage.setItem("all_users", JSON.stringify(usersArray));

                localStorage.setItem("current_user", JSON.stringify(newUser));

                alert("Вы успешно зарегистрированы!");
                goProfile();
            }
        }
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InjectincoPlayground - Агенты</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand text-warning" href="dashboard.html">
        <i class="bi bi-robot"></i> InjectincoPlayground
      </a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="dashboard.html">Дашборд</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="agents.html">Агенты и Фильтры</a>
          </li>
        </ul>
        <div class="text-light">
          <i class="bi bi-person-circle"></i> User1337
          <a href="login.html" class="btn btn-danger ms-3">Выход</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="row">
      <div class="col-md-3">
        <div class="card">
          <div class="card-body">
            <h5>Фильтры</h5>
            <form>
              <div class="mb-3">
                <label class="form-label">Роль агента</label>
                <select class="form-select">
                  <option>Все роли</option>
                  <option>Attacker (Red)</option>
                  <option>Defender (Blue)</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label">Уровень агрессии</label>
                <input type="range" class="form-range" min="0" max="2" step="0.1">
              </div>

              <div class="mb-3">
                <label class="form-label">Навык</label>
                <div>
                  <input type="checkbox"> Jailbreak
                </div>
                <div>
                  <input type="checkbox"> Prompt Injection
                </div>
              </div>

              <button class="btn btn-primary w-100" type="button">Применить</button>
            </form>
          </div>
        </div>
      </div>

      <div class="col-md-9">
        <h4>Доступные модели</h4>

        <div class="row mt-3">
          <div class="col-md-4">
            <div class="card text-center">
              <div class="card-body">
                <i class="bi bi-incognito text-danger fs-1"></i>
                <h5 class="mt-2">DAN 11.0</h5>
                <p>Roleplay Master</p>
                <button class="btn btn-dark w-100">Добавить</button>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card text-center">
              <div class="card-body">
                <i class="bi bi-robot text-info fs-1"></i>
                <h5 class="mt-2">SafeGuard Bot</h5>
                <p>Защитник системных промптов</p>
                <button class="btn btn-dark w-100">Добавить</button>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card text-center">
              <div class="card-body">
                <i class="bi bi-braces text-danger fs-1"></i>
                <h5 class="mt-2">Payload Crafter</h5>
                <p>Генератор инъекций</p>
                <button class="btn btn-dark w-100">Добавить</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

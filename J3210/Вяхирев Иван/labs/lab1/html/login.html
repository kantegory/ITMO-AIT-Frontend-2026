<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InjectincoPlayground - Вход</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand text-warning" href="dashboard.html">
        <i class="bi bi-robot"></i> InjectincoPlayground
      </a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="dashboard.html">Дашборд</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="agents.html">Агенты и Фильтры</a>
          </li>
        </ul>
        <div>
          <a href="login.html" class="btn btn-light active">Вход</a>
          <a href="register.html" class="btn btn-primary">Регистрация</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card">
          <div class="card-body text-center">
            <i class="bi bi-shield-lock text-primary fs-1"></i>
            <h3 class="mt-2 mb-4">Вход в систему</h3>

            <form action="dashboard.html">
              <div class="mb-3 text-start">
                <label class="form-label">Email адрес</label>
                <input type="email" class="form-control" required>
              </div>
              <div class="mb-4 text-start">
                <label class="form-label">Пароль</label>
                <input type="password" class="form-control" required>
              </div>

              <button class="btn btn-primary w-100 mb-3" type="submit">Войти</button>
              <a href="register.html">Зарегистрироваться</a>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

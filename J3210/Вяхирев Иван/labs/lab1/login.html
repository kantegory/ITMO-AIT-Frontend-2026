<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css">
    <title>Вход</title>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
        <a class="navbar-brand" href="search.html">Курсы</a>
        <a class="nav-link text-white" href="search.html">Поиск</a>
        <a class="nav-link text-white" href="#" onclick="goProfile()">Личный кабинет</a>
        <a class="btn btn-primary" href="register.html">Регистрация</a>
    </nav>
    <br><br>

    <div class="container">
        <div class="row">
            <div class="col-md-4 offset-md-4">
                <div class="card">
                    <div class="card-body">
                        <h3>Вход в систему</h3>
                        <br>
                        <label>Логин</label>
                        <input id="logLogin" class="form-control">
                        <br>
                        <label>Пароль</label>
                        <input id="logPass" type="password" class="form-control">
                        <br>
                        <button class="btn btn-success btn-block" onclick="doLogin()">Войти</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function goProfile() {
            let data = localStorage.getItem("current_user");
            if (data === null) {
                alert("Сначала нужно войти!");
                window.location.href = "login.html";
            } else {
                let user = JSON.parse(data);
                if (user.role === "student") {
                    window.location.href = "profile.html";
                } else {
                    window.location.href = "teacher.html";
                }
            }
        }

        function doLogin() {
            let login = document.getElementById("logLogin").value;
            let pass = document.getElementById("logPass").value;

            let usersData = localStorage.getItem("all_users");
            let usersArray = [];
            if (usersData !== null) {
                usersArray = JSON.parse(usersData);
            }

            let foundUser = null;
            for (let i = 0; i < usersArray.length; i++) {
                if (usersArray[i].login === login && usersArray[i].password === pass) {
                    foundUser = usersArray[i];
                }
            }

            if (foundUser !== null) {
                localStorage.setItem("current_user", JSON.stringify(foundUser));
                goProfile();
            } else {
                alert("Неверный логин или пароль! Попробуйте еще раз.");
            }
        }
    </script>
  </body>
</html>

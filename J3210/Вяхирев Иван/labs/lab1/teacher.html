<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css">
    <title>Профиль Преподавателя</title>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
        <a class="navbar-brand" href="search.html">Курсы</a>
        <a class="nav-link text-white" href="search.html">Поиск</a>
        <a class="nav-link text-white" href="#" onclick="goProfile()">Личный кабинет</a>
        <a class="btn btn-danger" href="#" onclick="doLogout()">Выход</a>
    </nav>
    <br><br>

    <div class="container">
        <h2>Кабинет преподавателя: <span id="tName">Имя</span></h2>
        <br>
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h4>Создать новый курс</h4>
                        <br>
                        <label>Название курса</label>
                        <input id="cTitle" class="form-control">
                        <br>
                        <label>Предмет</label>
                        <select id="cSubject" class="form-control">
                            <option>Программирование</option>
                            <option>Дизайн</option>
                        </select>
                        <br>
                        <label>Уровень</label>
                        <select id="cLevel" class="form-control">
                            <option>Новичок</option>
                            <option>Продвинутый</option>
                        </select>
                        <br>
                        <label>Цена (руб)</label>
                        <input id="cPrice" type="number" class="form-control">
                        <br>
                        <label>Ссылка на лекции/материалы</label>
                        <input id="cVideo" class="form-control" placeholder="youtube.com/...">
                        <br>
                        <button class="btn btn-primary" onclick="addCourse()">Загрузить курс</button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <h4>Мои созданные курсы:</h4>
                <div id="teacherCourses"></div>
            </div>
        </div>
    </div>

    <script>
        function goProfile() { window.location.href = "teacher.html"; }
        function doLogout() {
            localStorage.removeItem("current_user");
            window.location.href = "login.html";
        }

        let userData = localStorage.getItem("current_user");
        if (userData !== null) {
            let user = JSON.parse(userData);
            document.getElementById("tName").innerText = user.login;
        } else {
            window.location.href = "login.html";
        }

        function addCourse() {
            let t = document.getElementById("cTitle").value;
            let s = document.getElementById("cSubject").value;
            let l = document.getElementById("cLevel").value;
            let p = document.getElementById("cPrice").value;
            let v = document.getElementById("cVideo").value;

            let newCourse = { title: t, subject: s, level: l, price: p, video: v };

            let data = localStorage.getItem("all_courses");
            let courses = [];
            if (data !== null) { courses = JSON.parse(data); }

            courses.push(newCourse);
            localStorage.setItem("all_courses", JSON.stringify(courses));

            alert("Курс добавлен!");
            window.location.reload(); 
        }

        let cData = localStorage.getItem("all_courses");
        if (cData !== null) {
            let courses = JSON.parse(cData);
            let html = "";
            for (let i = 0; i < courses.length; i++) {
                html += "<div class='card'><div class='card-body'>";
                html += "<b>" + courses[i].title + "</b><br>";
                html += "Уровень: " + courses[i].level + "<br>";
                html += "Материалы: " + courses[i].video;
                html += "</div></div><br>";
            }
            document.getElementById("teacherCourses").innerHTML = html;
        }
    </script>
  </body>
</html>

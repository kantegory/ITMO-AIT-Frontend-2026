<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <title>Профиль</title>
  </head>
  <body>

    <nav class="navbar navbar-dark bg-dark">
        <a class="navbar-brand" href="#">Курсы</a>
        <a class="nav-link text-white" href="search.html">Поиск</a>
        <a class="nav-link text-white" href="profile.html">Профиль</a>
        <a class="btn btn-light" href="login.html">Вход</a>
        <a class="btn btn-primary" href="register.html">Регистрация</a>
    </nav>
    <br><br>

    <div class="container">
        <div class="card">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-2">
                        <img src="https://via.placeholder.com/100">
                    </div>
                    <div class="col-md-8">
                        <h2>Иван Иванов</h2>
                        <p>Студент</p>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-warning" data-toggle="modal" data-target="#myModal">Редактировать</button>
                    </div>
                </div>
            </div>
        </div>

        <br>
        <h4>Мои курсы</h4>
        <div class="card">
            <div class="card-body">
                <h5>Python с нуля</h5>
                <p>Прогресс: 50%</p>
                <div class="progress">
                    <div class="progress-bar bg-success" style="width: 50%"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="myModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5>Настройки</h5>
                </div>
                <div class="modal-body">
                    <label>Новое имя</label>
                    <input class="form-control">
                    <br>
                    <button class="btn btn-secondary" data-dismiss="modal">Закрыть</button>
                    <button class="btn btn-success">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
  </body>
</html>

<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css">
    <title>Профиль студента</title>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
        <a class="navbar-brand" href="search.html">Курсы</a>
        <a class="nav-link text-white" href="search.html">Поиск</a>
        <a class="nav-link text-white" href="#" onclick="goProfile()">Личный кабинет</a>
        <a class="btn btn-danger" href="#" onclick="doLogout()">Выход</a>
    </nav>
    <br><br>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body text-center">
                        <h4 id="userName">Студент</h4>
                        <p class="text-muted">Аккаунт: Студент</p>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <h4>Мои купленные курсы</h4>
                <br>
                <div id="myCoursesList"></div>
            </div>
        </div>
    </div>

    <script>
        function goProfile() { window.location.href = "profile.html"; }
        function doLogout() {
            localStorage.removeItem("current_user");
            window.location.href = "login.html";
        }

        let userData = localStorage.getItem("current_user");
        if (userData !== null) {
            let user = JSON.parse(userData);
            document.getElementById("userName").innerText = user.login;
        } else {
            window.location.href = "login.html";
        }

        let bData = localStorage.getItem("bought_courses");
        if (bData !== null) {
            let bought = JSON.parse(bData);
            let html = "";
            for (let i = 0; i < bought.length; i++) {
                html += "<div class='card'><div class='card-body'>";
                html += "<h5>" + bought[i].title + "</h5>";
                html += "<p>Прогресс: 30%</p>";
                html += "<div class='progress'><div class='progress-bar bg-success' style='width: 30%'></div></div>";
                html += "<br><button class='btn btn-primary'>Смотреть лекции</button> ";
                html += "<button class='btn btn-outline-success'>Сертификат</button>";
                html += "</div></div><br>";
            }
            document.getElementById("myCoursesList").innerHTML = html;
        } else {
            document.getElementById("myCoursesList").innerHTML = "<p>Вы еще ничего не купили.</p>";
        }
    </script>
  </body>
</html>

<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css">
    <title>Поиск</title>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
        <a class="navbar-brand" href="search.html">Курсы</a>
        <a class="nav-link text-white" href="search.html">Поиск</a>
        <a class="nav-link text-white" href="#" onclick="goProfile()">Личный кабинет</a>
        <a class="btn btn-light" href="login.html">Вход</a>
        <a class="btn btn-danger" href="#" onclick="doLogout()">Выход</a>
    </nav>
    <br><br>

    <div class="container">
        <h2>Поиск курсов</h2>
        <br>
        <div class="row">
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body">
                        <h5>Фильтры</h5>
                        <br>
                        <label>Предмет</label>
                        <select id="fSubject" class="form-control">
                            <option>Все</option>
                            <option>Программирование</option>
                            <option>Дизайн</option>
                        </select>
                        <br>
                        <label>Уровень</label>
                        <select id="fLevel" class="form-control">
                            <option>Все</option>
                            <option>Новичок</option>
                            <option>Продвинутый</option>
                        </select>
                        <br>
                        <label>Макс. цена</label>
                        <input id="fPrice" type="number" value="100000" class="form-control">
                        <br>
                        <button class="btn btn-primary btn-block" onclick="doSearch()">Искать</button>
                    </div>
                </div>
            </div>

            <div class="col-md-9">
                <div class="row" id="results"></div>
            </div>
        </div>
    </div>

    <script>
        function goProfile() {
            let data = localStorage.getItem("current_user");
            if (data === null) {
                alert("Сначала нужно войти!");
                window.location.href = "login.html";
            } else {
                let user = JSON.parse(data);
                if (user.role === "student") {
                    window.location.href = "profile.html";
                } else {
                    window.location.href = "teacher.html";
                }
            }
        }

        function doLogout() {
            localStorage.removeItem("current_user");
            alert("Вы вышли из аккаунта.");
            window.location.href = "login.html";
        }

        let allCourses = [];
        let data = localStorage.getItem("all_courses");
        
        if (data !== null) {
            allCourses = JSON.parse(data);
        } else {
            allCourses = [{title: "Основы HTML", subject: "Программирование", level: "Новичок", price: 1000, video: "нет"}];
            localStorage.setItem("all_courses", JSON.stringify(allCourses));
        }

        function draw(array) {
            let html = "";
            for (let i = 0; i < array.length; i++) {
                html += "<div class='col-md-4'><div class='card'><div class='card-body'>";
                html += "<h5>" + array[i].title + "</h5>";
                html += "<p>Предмет: " + array[i].subject + "</p>";
                html += "<p>Уровень: " + array[i].level + "</p>";
                html += "<p>Цена: " + array[i].price + " руб.</p>";
                html += "<button class='btn btn-success' onclick='openCourse(" + i + ")'>Открыть</button>";
                html += "</div></div><br></div>";
            }
            document.getElementById("results").innerHTML = html;
        }

        draw(allCourses);

        function doSearch() {
            let sub = document.getElementById("fSubject").value;
            let lev = document.getElementById("fLevel").value;
            let maxP = parseInt(document.getElementById("fPrice").value);

            let result = [];
            for (let i = 0; i < allCourses.length; i++) {
                let c = allCourses[i];
                let ok = true;

                if (sub !== "Все" && c.subject !== sub) { ok = false; }
                if (lev !== "Все" && c.level !== lev) { ok = false; }
                if (parseInt(c.price) > maxP) { ok = false; }

                if (ok === true) { result.push(c); }
            }
            draw(result);
        }

        function openCourse(id) {
            localStorage.setItem("currentCourse", JSON.stringify(allCourses[id]));
            window.location.href = "course.html";
        }
    </script>
  </body>
</html>

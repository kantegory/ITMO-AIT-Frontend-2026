<html lang="ru">

                        <label>Предмет</label>
                        <select class="form-control">
                            <option>Программирование</option>

                        <br>

                        <input type="range" class="form-control">

                </div>
            </div>

            <div class="col-md-9">

                    <div class="col-md-4">

                                <h5>Python с нуля</h5>
                                <p>5000 руб.</p>
                                <button class="btn btn-success">Подробнее</button>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">

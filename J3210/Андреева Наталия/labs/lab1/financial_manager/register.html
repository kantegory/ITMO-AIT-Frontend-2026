<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-4 card p-4 shadow-sm">
            <h3 class="mb-4">Регистрация</h3>
            <input type="text" id="name" class="form-control mb-3" placeholder="Имя">
            <input type="text" id="surname" class="form-control mb-3" placeholder="Фамилия">
            <input type="email" id="email" class="form-control mb-3" placeholder="Email">
            <input type="password" id="pass" class="form-control mb-4" placeholder="Пароль">
            <button id="regBtn" class="btn btn-success w-100 py-2">Зарегистрироваться</button>
            <a href="index.html" class="btn btn-outline-secondary w-100 mt-3">Назад ко входу</a>
        </div>
    </div>
</div>
<script src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск транзакций — MyWallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary px-3 mb-4 rounded-bottom shadow-sm">
    <a class="navbar-brand fw-bold">MyWallet</a>
    <a href="dashboard.html" class="btn btn-outline-light btn-sm">Назад в кабинет</a>
</nav>

<div class="container">
    <div class="card p-4 shadow-sm border-0">
        <h4 class="mb-4 fw-bold">Поиск транзакций</h4>
        <div class="row g-2 mb-4">
            <div class="col-12 col-md-4"><input type="text" id="filterCat" class="form-control" placeholder="Категория"></div>
            <div class="col-12 col-md-4"><input type="number" id="filterSum" class="form-control" placeholder="Максимальная сумма"></div>
            <div class="col-12 col-md-4"><input type="date" id="filterDate" class="form-control"></div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr><th>Категория</th><th>Сумма</th><th>Дата</th></tr>
                </thead>
                <tbody id="transBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="js/main.js"></script>
<script>
    const userEmail = localStorage.getItem('currentUserEmail');
    if (!localStorage.getItem('isLoggedIn') || !userEmail) {
        window.location.href = 'index.html';
    }

    function renderTable() {
        const term = document.getElementById('filterCat').value.toLowerCase();
        const maxSum = parseFloat(document.getElementById('filterSum').value);
        const dateFilter = document.getElementById('filterDate').value;
        const transactions = JSON.parse(localStorage.getItem('transactions_' + userEmail) || "[]");

        const tbody = document.getElementById('transBody');
        tbody.innerHTML = '';

        transactions.filter(t =>
            (!term || t.cat.toLowerCase().includes(term)) &&
            (isNaN(maxSum) || parseFloat(t.sum) <= maxSum) &&
            (!dateFilter || t.date === dateFilter)
        ).forEach(t => {
            const d = t.date.split('-');
            const formattedDate = d.length === 3 ? `${d[2]}.${d[1]}.${d[0]}` : t.date;

            tbody.innerHTML += `<tr>
                <td class="fw-bold">${t.cat}</td>
                <td class="${t.type === 'plus' ? 'text-success' : 'text-danger'} fw-bold">
                    ${t.type === 'plus' ? '+' : '-'}${parseFloat(t.sum).toLocaleString()} ₽
                </td>
                <td class="text-muted small">${formattedDate}</td>
            </tr>`;
        });
    }
    document.querySelectorAll('input').forEach(i => i.addEventListener('input', renderTable));
    renderTable();
</script>
</body>
</html>

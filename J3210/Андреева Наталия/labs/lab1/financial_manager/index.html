<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — MyWallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-4 card p-4 shadow-sm border-0">
            <h3 class="mb-4 text-center">Вход в MyWallet</h3>
            <input type="email" id="email" class="form-control mb-3" placeholder="Email">
            <input type="password" id="pass" class="form-control mb-3" placeholder="Пароль">
            <button id="loginBtn" class="btn btn-primary w-100 py-2 fw-bold">Войти</button>
            <a href="register.html" class="btn btn-outline-primary w-100 mt-3">Регистрация</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginBtn').addEventListener('click', () => {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('pass').value.trim();

        const users = JSON.parse(localStorage.getItem('users') || "[]");
        const user = users.find(u => u.email === email && u.pass === pass);

        if (user) {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('currentUserEmail', user.email);
            localStorage.setItem('userFullName', user.name + " " + user.surname);

            window.location.href = 'dashboard.html';
        } else {
            alert("Неверный Email или пароль!");
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MLOps Flow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<!-- Класс auth-wrapper превращает фон в гибкий контейнер, который держит карточку строго по центру -->
<body class="auth-wrapper">

     <!-- Основной блок: p-4 дает внутренние отступы, чтобы текст не «прилипал» к краям -->
    <div class="card auth-card p-4">
        <!-- Хедер формы: визуальная идентификация бренда и краткая подсказка пользователю -->
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary"><i class="fas fa-brain me-2"></i>MLOps Flow</h3>
            <p class="text-muted">Sign in to manage your pipelines</p>
        </div>

         <!-- Форма авторизации: action ведет на Dashboard -->
        <form action="dashboard.html" class="needs-validation" novalidate>
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                <div class="invalid-feedback">Please enter a valid email.</div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                <div class="invalid-feedback">Password is required.</div>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">Sign In</button>
            </div>
        </form>

        <div class="text-center mt-4">
            <p class="small text-muted">Don't have an account? <a href="register.html" class="text-decoration-none fw-bold">Register</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

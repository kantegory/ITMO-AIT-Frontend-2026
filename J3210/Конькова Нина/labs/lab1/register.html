<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLOps Flow - Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .register-container {
            max-width: 450px;
            width: 100%;
        }
    </style>
</head>
<!-- Используем Flexbox (d-flex), чтобы центрировать форму и по вертикали (vh-100), и по горизонтали -->
<body class="d-flex align-items-center vh-100">

    <div class="container d-flex justify-content-center">
        <div class="register-container">
            <!-- Карточка с глубокой тенью (shadow-lg) и без стандартных рамок (border-0) -->
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-primary"><i class="fas fa-brain me-2"></i>MLOps Flow</h3>
                        <p class="text-muted small">Create an account</p>
                    </div>

                    <!-- Форма регистрации. novalidate отключает стандартные алерты браузера,
                         так как мы используем кастомную валидацию Bootstrap (needs-validation) -->
                    <form class="needs-validation" novalidate id="registerForm" action="dashboard.html">

                        <div class="mb-3">
                            <label class="form-label">User name</label>
                            <input type="text" class="form-control" placeholder="nina_konkova" required>
                            <div class="invalid-feedback">Please, input user name.</div>
                        </div>

                         <!-- Поле Email с автоматической проверкой формата @ на стороне браузера -->
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="name@example.com" required>
                            <div class="invalid-feedback">Input an email.</div>
                        </div>

                         <!-- Первое поле пароля с ограничением минимальной длины -->
                        <div class="mb-3">
                            <label class="form-label">Пароль</label>
                            <input type="password" class="form-control" id="password" placeholder="••••••••" required minlength="6">
                            <div class="invalid-feedback">6 symbols at least</div>
                        </div>

                        <!-- Поле подтверждения пароля. Скрипт ниже проверит его на идентичность первому -->
                        <div class="mb-4">
                            <label class="form-label">Confirm the password</label>
                            <input type="password" class="form-control" id="confirmPassword" placeholder="••••••••" required>
                            <div class="invalid-feedback">Passwords must match</div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2">Register</button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-0 text-muted small">Already have an account? <a href="index.html" class="text-primary text-decoration-none fw-bold">Login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/auth.js"></script>
</body>
</html>

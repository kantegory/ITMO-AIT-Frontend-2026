<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FlowOrchestrator | Регистрация</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <main class="auth-layout" aria-labelledby="registerTitle">
    <section class="auth-panel card border-0 shadow-lg">
      <div class="card-body p-4 p-md-5">
        
        <header class="auth-panel__header text-center mb-4">
          <div class="brand-mark mx-auto mb-2" aria-hidden="true">FO</div>
          <h1 id="registerTitle" class="h4 mb-1 fw-bold">Создание аккаунта</h1>
          <p class="text-secondary mb-0">Подключитесь к команде DataOps</p>
        </header>

        
        <form id="registerForm" novalidate aria-label="Форма регистрации">
          <div class="row g-3">
            <div class="col-12">
              <label for="name" class="form-label">Имя</label>
              <input type="text" id="name" class="form-control" autocomplete="name" required>
              <div class="invalid-feedback">Укажите имя.</div>
            </div>

            <div class="col-12">
              <label for="email" class="form-label">Email</label>
              <input type="email" id="email" class="form-control" placeholder="you@company.com" autocomplete="email" required>
              <div class="invalid-feedback">Укажите корректный email.</div>
            </div>

            <div class="col-12">
              <label for="regPassword" class="form-label">Пароль</label>
              <div class="input-group">
                <input type="password" id="regPassword" class="form-control" autocomplete="new-password" required>
                <button class="btn btn-outline-primary" type="button" data-password-toggle data-target="regPassword" aria-label="Показать или скрыть пароль">Показать</button>
              </div>
              <div class="invalid-feedback d-block" id="regPasswordError"></div>
            </div>

            <div class="col-12">
              <label for="confirmPassword" class="form-label">Подтверждение пароля</label>
              <div class="input-group">
                <input type="password" id="confirmPassword" class="form-control" autocomplete="new-password" required>
                <button class="btn btn-outline-primary" type="button" data-password-toggle data-target="confirmPassword" aria-label="Показать или скрыть подтверждение пароля">Показать</button>
              </div>
              <div class="invalid-feedback d-block" id="confirmPasswordError"></div>
            </div>

            <div class="col-12">
              <label for="team" class="form-label">Команда / Организация</label>
              <input type="text" id="team" class="form-control" placeholder="Data Platform Team" required>
              <div class="invalid-feedback">Укажите команду или организацию.</div>
            </div>

            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="agree" required>
                <label class="form-check-label" for="agree">Я согласен с условиями использования</label>
                <div class="invalid-feedback">Подтвердите согласие.</div>
              </div>
            </div>
          </div>

          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
          </div>

          <p class="text-center mt-3 mb-0 text-secondary">
            Уже есть аккаунт?
            <a href="index.html" class="text-decoration-none fw-semibold">Войти</a>
          </p>
        </form>
      </div>
    </section>
  </main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="actionToast" class="toast" role="status" aria-live="polite" aria-atomic="true">
      <div class="toast-header">
        <strong class="me-auto">FlowOrchestrator</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Закрыть"></button>
      </div>
      <div class="toast-body" id="toastBody">Операция выполнена.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>

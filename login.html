<!DOCTYPE html>
<html lang="ru" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Minion Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="card auth-card">
            <div class="text-center mb-4">
                <i class="bi bi-mortarboard-fill text-primary" style="font-size: 3rem;"></i>
                <h2 class="mt-2">Вход в <span class="brand-minion">Minion</span> <span class="brand-courses">Courses</span></h2>
                <p class="text-muted">Войдите, чтобы продолжить обучение</p>
            </div>
            
            <form class="needs-validation" novalidate>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="example@mail.ru" required>
                    <div class="invalid-feedback">Введите корректный email</div>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" class="form-control" id="password" placeholder="Введите пароль" required minlength="6">
                    <div class="invalid-feedback">Пароль должен содержать минимум 6 символов</div>
                </div>
                
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label" for="remember">Запомнить меня</label>
                    </div>
                    <a href="#" class="text-primary text-decoration-none">Забыли пароль?</a>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mb-3">Войти</button>
                
                <div class="text-center">
                    <span class="text-muted">Нет аккаунта?</span>
                    <a href="register.html" class="text-primary text-decoration-none">Зарегистрироваться</a>
                </div>
            </form>
            
            <div class="text-center mt-4">
                <span class="theme-toggle" onclick="toggleTheme()">
                    <i class="bi bi-moon-fill" id="themeIcon"></i>
                </span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
